name: 🔍 Validate Setup Script (Pester)

on:
  push:
    branches: [ main, master, dev ]
    paths:
      - '**.ps1'
      - '**.Tests.ps1'
      - '.github/workflows/test-setup.yml'
  pull_request:
    branches: [ main, master ]

env:
  PESTER_VERSION: "5.6.0"

jobs:
  validate:
    name: Pester Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Verify PowerShell 7+
        shell: pwsh
        run: |
          $minVersion = [version]"7.4"
          $currentVersion = $PSVersionTable.PSVersion
          if ($currentVersion -lt $minVersion) {
            Write-Error "PowerShell $minVersion+ requis. Actuel : $currentVersion"
            exit 1
          }
          Write-Host "✅ PowerShell $currentVersion détecté" -ForegroundColor Green

      - name: 📦 Cache Pester Module
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/powershell/Modules/Pester
            ~/Documents/PowerShell/Modules/Pester
          key: ${{ runner.os }}-pester-${{ env.PESTER_VERSION }}
          restore-keys: |
            ${{ runner.os }}-pester-

      - name: 🔧 Install Pester
        shell: pwsh
        run: |
          $minVersion = [version]"5.4.0"
          $installed = Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge $minVersion }
          if (-not $installed) {
            Write-Host "📦 Installation de Pester v${{ env.PESTER_VERSION }}..." -ForegroundColor Cyan
            Install-Module Pester -Force -Scope CurrentUser -MinimumVersion ${{ env.PESTER_VERSION }} -AllowClobber
          } else {
            Write-Host "✅ Pester déjà installé ($($installed[0].Version))" -ForegroundColor Green
          }

      - name: 🧪 Run Pester Tests
        id: test
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = "./setup-megalinter.Tests.ps1"
          $config.Output.Verbosity = "Detailed"

          $result = Invoke-Pester -Configuration $config

          "failed=$($result.FailedCount)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "passed=$($result.PassedCount)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: ✅ Tests Result
        shell: pwsh
        run: |
          $output = Get-Content $env:GITHUB_OUTPUT -Raw
          $failed = ($output -match 'failed=(\d+)') ? $matches[1] : "0"
          $passed = ($output -match 'passed=(\d+)') ? $matches[1] : "0"
          Write-Host "Tests completed: $passed passed, $failed failed"
          if ($failed -ne "0") { exit 1 }